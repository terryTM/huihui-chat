<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Huihui Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; color: #e94560; }
  header .model-tag {
    font-size: 12px; background: #0f3460; padding: 4px 10px;
    border-radius: 12px; color: #a0a0b8;
  }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block;
  }
  .status-dot.offline { background: #666; }
  .status-dot.starting { background: #f0a500; animation: pulse 1s infinite; }
  .status-dot.online { background: #4ecca3; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .settings-bar {
    padding: 10px 24px; background: #16213e; border-bottom: 1px solid #0f3460;
    display: flex; align-items: center; gap: 10px; font-size: 13px;
  }
  .settings-bar label { color: #a0a0b8; }
  .settings-bar input[type="text"] {
    flex: 1; padding: 6px 10px; background: #1a1a2e; border: 1px solid #0f3460;
    border-radius: 6px; color: #e0e0e0; font-size: 13px;
  }
  .settings-bar input[type="text"]:focus { outline: none; border-color: #e94560; }

  /* Startup overlay */
  #startup-overlay {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 24px;
  }
  #startup-overlay.hidden { display: none; }
  .startup-icon { font-size: 48px; }
  .startup-title { font-size: 22px; font-weight: 600; color: #fff; }
  .startup-subtitle { font-size: 14px; color: #a0a0b8; text-align: center; max-width: 400px; line-height: 1.5; }
  .start-btn {
    padding: 14px 40px; background: #e94560; color: white; border: none;
    border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
    transition: background 0.2s;
  }
  .start-btn:hover { background: #c73652; }
  .start-btn:disabled { background: #444; cursor: not-allowed; }
  .startup-progress {
    display: flex; flex-direction: column; gap: 10px; width: 350px;
  }
  .startup-progress.hidden { display: none; }
  .progress-step {
    display: flex; align-items: center; gap: 10px; font-size: 13px; color: #666;
  }
  .progress-step.active { color: #f0a500; }
  .progress-step.done { color: #4ecca3; }
  .progress-step .step-icon { width: 20px; text-align: center; }
  .progress-bar-track {
    width: 100%; height: 4px; background: #0f3460; border-radius: 2px; margin-top: 8px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: #e94560; border-radius: 2px; transition: width 0.5s ease;
    width: 0%;
  }
  .startup-timer { font-size: 12px; color: #666; }

  /* Chat area */
  #chat-container { flex: 1; display: flex; flex-direction: column; }
  #chat-container.hidden { display: none; }
  #chat {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .message {
    max-width: 75%; padding: 12px 16px; border-radius: 16px;
    line-height: 1.5; font-size: 15px; word-wrap: break-word;
  }
  .message.user { white-space: pre-wrap; align-self: flex-end; background: #0f3460; border-bottom-right-radius: 4px; }
  .message.assistant { align-self: flex-start; background: #222244; border-bottom-left-radius: 4px; }
  .message .md-content h1, .message .md-content h2, .message .md-content h3 { margin: 12px 0 6px; color: #fff; }
  .message .md-content p { margin: 6px 0; }
  .message .md-content ul, .message .md-content ol { margin: 6px 0; padding-left: 20px; }
  .message .md-content li { margin: 3px 0; }
  .message .md-content code { background: #1a1a2e; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .message .md-content pre { background: #0d1117; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
  .message .md-content pre code { background: none; padding: 0; font-size: 13px; line-height: 1.4; }
  .message .md-content blockquote { border-left: 3px solid #e94560; padding-left: 12px; margin: 8px 0; color: #a0a0b8; }
  .message .md-content table { border-collapse: collapse; margin: 8px 0; }
  .message .md-content th, .message .md-content td { border: 1px solid #333; padding: 6px 10px; font-size: 13px; }
  .message .md-content th { background: #1a1a2e; }
  .message .md-content a { color: #5e9eff; }
  .thinking-toggle {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    padding: 6px 10px; margin-bottom: 8px; background: #1a1a2e;
    border-radius: 8px; border: 1px solid #2a2a4a; font-size: 12px;
    color: #a0a0b8; user-select: none; transition: background 0.2s;
  }
  .thinking-toggle:hover { background: #222244; }
  .thinking-toggle .arrow { transition: transform 0.2s; display: inline-block; }
  .thinking-toggle .arrow.open { transform: rotate(90deg); }
  .thinking-toggle .label { font-weight: 600; }
  .thinking-toggle .duration { color: #666; margin-left: auto; }
  .thinking-content {
    display: none; padding: 10px 12px; margin-bottom: 10px;
    background: #1a1a2e; border-radius: 8px; border-left: 3px solid #f0a500;
    font-size: 13px; color: #888; line-height: 1.5; max-height: 400px; overflow-y: auto;
  }
  .thinking-content.open { display: block; }
  .message .role { font-size: 11px; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; color: #a0a0b8; }
  .message.user .role { color: #5e9eff; }
  .message.assistant .role { color: #e94560; }
  .message .tokens { font-size: 11px; color: #666; margin-top: 6px; }
  .typing { align-self: flex-start; padding: 12px 16px; color: #a0a0b8; font-style: italic; font-size: 14px; }
  .typing .dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
  @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
  #input-area { padding: 16px 24px; background: #16213e; border-top: 1px solid #0f3460; display: flex; gap: 12px; }
  #input-area textarea {
    flex: 1; padding: 12px 16px; background: #1a1a2e; border: 1px solid #0f3460;
    border-radius: 12px; color: #e0e0e0; font-size: 15px; font-family: inherit;
    resize: none; min-height: 48px; max-height: 150px;
  }
  #input-area textarea:focus { outline: none; border-color: #e94560; }
  #input-area button {
    padding: 12px 24px; background: #e94560; color: white; border: none;
    border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  #input-area button:hover { background: #c73652; }
  #input-area button:disabled { background: #444; cursor: not-allowed; }
  .error { align-self: center; background: #3a1a1a; color: #ff6b6b; padding: 10px 16px; border-radius: 8px; font-size: 13px; }
  .clear-btn {
    padding: 5px 12px; background: #0f3460; color: #a0a0b8; border: none;
    border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .clear-btn:hover { background: #e94560; color: white; }
  .shutdown-btn { background: #3a1a1a; color: #ff6b6b; }
  .shutdown-btn:hover { background: #ff6b6b; color: white; }
  .header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
</style>
</head>
<body>

<header>
  <h1>Huihui Chat</h1>
  <span class="model-tag">Qwen3.5-27B-Claude-Opus-abliterated</span>
  <span class="status-dot offline" id="status-dot" title="Offline"></span>
  <span id="status-text" style="font-size:12px;color:#666">Offline</span>
  <div class="header-right">
    <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
    <button class="clear-btn shutdown-btn" onclick="shutdown()">Shutdown GPU</button>
  </div>
</header>

<div class="settings-bar">
  <label for="url">Endpoint:</label>
  <input type="text" id="url" value="https://terryma-cutismeadow--huihui-qwen35-27b-abliterated-serve.modal.run/v1/chat/completions">
</div>

<!-- Startup screen -->
<div id="startup-overlay">
  <div class="startup-title">Huihui-Qwen3.5-27B</div>
  <div class="startup-subtitle">
    Abliterated model running on Modal with A100 GPU.<br>
    Click below to wake up the server.
  </div>
  <button class="start-btn" id="start-btn" onclick="startServer()">Start Server</button>
  <div class="startup-progress hidden" id="startup-progress">
    <div class="progress-step" id="step-container" data-step="container">
      <span class="step-icon">1</span> Provisioning GPU container
    </div>
    <div class="progress-step" id="step-ollama" data-step="ollama">
      <span class="step-icon">2</span> Starting Ollama engine
    </div>
    <div class="progress-step" id="step-model" data-step="model">
      <span class="step-icon">3</span> Loading model into VRAM
    </div>
    <div class="progress-step" id="step-ready" data-step="ready">
      <span class="step-icon">4</span> Ready to chat
    </div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="startup-timer" id="startup-timer">Elapsed: 0s</div>
  </div>
</div>

<!-- Chat area (hidden until ready) -->
<div id="chat-container" class="hidden">
  <div id="chat"></div>
  <div id="input-area">
    <textarea id="msg" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="send()">Send</button>
  </div>
</div>

<script>
const chatEl = document.getElementById('chat');
const msgEl = document.getElementById('msg');
const sendBtn = document.getElementById('send-btn');
const urlEl = document.getElementById('url');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
let messages = [];
let serverReady = false;

function getBaseUrl() {
  return urlEl.value.replace(/\/v1\/chat\/completions$/, '');
}

function setStatus(state, text) {
  statusDot.className = 'status-dot ' + state;
  statusText.textContent = text;
}

function setStep(stepId) {
  const steps = ['container', 'ollama', 'model', 'ready'];
  const idx = steps.indexOf(stepId);
  steps.forEach((s, i) => {
    const el = document.getElementById('step-' + s);
    if (i < idx) { el.className = 'progress-step done'; el.querySelector('.step-icon').textContent = '\u2713'; }
    else if (i === idx) { el.className = 'progress-step active'; }
    else { el.className = 'progress-step'; }
  });
  document.getElementById('progress-fill').style.width = ((idx + 1) / steps.length * 100) + '%';
}

async function startServer() {
  const btn = document.getElementById('start-btn');
  btn.disabled = true;
  btn.textContent = 'Starting...';
  document.getElementById('startup-progress').classList.remove('hidden');

  setStatus('starting', 'Starting...');
  setStep('container');

  const start = Date.now();
  const timerEl = document.getElementById('startup-timer');
  const timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - start) / 1000);
    timerEl.textContent = `Elapsed: ${elapsed}s`;
  }, 1000);

  // Poll /api/tags until we get a response with the model
  let phase = 0; // 0=container, 1=ollama, 2=model
  const base = getBaseUrl();

  while (true) {
    try {
      const resp = await fetch(base + '/api/tags', { signal: AbortSignal.timeout(10000) });
      if (resp.ok) {
        const data = await resp.json();
        if (phase < 1) { phase = 1; setStep('ollama'); }

        const models = data.models || [];
        const hasModel = models.some(m => m.name && m.name.includes('huihui'));
        if (hasModel) {
          if (phase < 2) { phase = 2; setStep('model'); }

          // Try a quick inference to confirm model is loaded into VRAM
          try {
            const chatResp = await fetch(urlEl.value, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                model: 'huihui-qwen35-27b',
                messages: [{ role: 'user', content: 'Hi' }],
                max_tokens: 4,
                temperature: 0,
              }),
              signal: AbortSignal.timeout(300000),
            });
            if (chatResp.ok) {
              setStep('ready');
              break;
            }
          } catch (e) {
            // Model still loading, continue polling
          }
        }
      }
    } catch (e) {
      // Container not up yet
      const elapsed = Math.floor((Date.now() - start) / 1000);
      if (elapsed > 10 && phase === 0) { setStep('container'); }
    }
    await new Promise(r => setTimeout(r, 3000));
  }

  clearInterval(timerInterval);
  const totalTime = Math.floor((Date.now() - start) / 1000);
  timerEl.textContent = `Ready in ${totalTime}s`;

  serverReady = true;
  setStatus('online', 'Online');

  // Transition to chat
  document.getElementById('startup-overlay').classList.add('hidden');
  document.getElementById('chat-container').classList.remove('hidden');
  msgEl.focus();
}

function renderMarkdown(text) {
  marked.setOptions({
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return hljs.highlightAuto(code).value;
    },
    breaks: true,
  });
  return marked.parse(text);
}

function parseThinking(content) {
  const match = content.match(/<think>([\s\S]*?)<\/think>/);
  if (!match) return { thinking: null, response: content.trim() };
  const thinking = match[1].trim();
  const response = content.replace(/<think>[\s\S]*?<\/think>/, '').trim();
  return { thinking, response };
}

function addBubble(role, content, tokens, thinkingTime) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const roleLabel = document.createElement('div');
  roleLabel.className = 'role';
  roleLabel.textContent = role === 'user' ? 'You' : 'Assistant';
  div.appendChild(roleLabel);

  if (role === 'assistant') {
    const { thinking, response } = parseThinking(content);

    if (thinking) {
      const toggle = document.createElement('div');
      toggle.className = 'thinking-toggle';
      const timeStr = thinkingTime ? ` (${thinkingTime}s)` : '';
      toggle.innerHTML = `<span class="arrow">&#9654;</span><span class="label">Thinking</span><span class="duration">${timeStr}</span>`;
      div.appendChild(toggle);

      const thinkDiv = document.createElement('div');
      thinkDiv.className = 'thinking-content';
      thinkDiv.innerHTML = renderMarkdown(thinking);
      div.appendChild(thinkDiv);

      toggle.onclick = () => {
        const arrow = toggle.querySelector('.arrow');
        arrow.classList.toggle('open');
        thinkDiv.classList.toggle('open');
      };
    }

    const text = document.createElement('div');
    text.className = 'md-content';
    text.innerHTML = renderMarkdown(response);
    div.appendChild(text);
  } else {
    const text = document.createElement('div');
    text.textContent = content;
    div.appendChild(text);
  }

  if (tokens) {
    const t = document.createElement('div');
    t.className = 'tokens';
    t.textContent = `${tokens.prompt_tokens || '?'}+${tokens.completion_tokens || '?'} tokens`;
    div.appendChild(t);
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  div.innerHTML = 'Thinking<span class="dots"></span>';
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function send() {
  const content = msgEl.value.trim();
  if (!content) return;

  msgEl.value = '';
  msgEl.style.height = 'auto';
  sendBtn.disabled = true;

  messages.push({ role: 'user', content });
  addBubble('user', content);
  showTyping();

  const sendTime = Date.now();
  try {
    const resp = await fetch(urlEl.value, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'huihui-qwen35-27b',
        messages: messages,
        max_tokens: 2048,
        temperature: 0.7,
      }),
    });

    if (!resp.ok) {
      const errBody = await resp.text();
      throw new Error(`${resp.status}: ${errBody}`);
    }

    const data = await resp.json();
    const msg = data.choices[0].message;
    const usage = data.usage || null;
    const elapsed = ((Date.now() - sendTime) / 1000).toFixed(1);

    messages.push({ role: 'assistant', content: msg.content });
    hideTyping();
    addBubble('assistant', msg.content, usage, elapsed);
  } catch (e) {
    hideTyping();
    const div = document.createElement('div');
    div.className = 'error';
    div.textContent = `Error: ${e.message}`;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    messages.pop();
  }

  sendBtn.disabled = false;
  msgEl.focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function clearChat() {
  messages = [];
  chatEl.innerHTML = '';
}

async function shutdown() {
  if (!confirm('Shut down the GPU container? Next message will need a cold start (~1-2 min).')) return;
  const base = getBaseUrl();
  try {
    await fetch(base + '/shutdown', { method: 'POST' });
  } catch (e) { /* connection reset expected */ }
  serverReady = false;
  setStatus('offline', 'Offline');
  document.getElementById('chat-container').classList.add('hidden');
  document.getElementById('startup-overlay').classList.remove('hidden');
  document.getElementById('start-btn').disabled = false;
  document.getElementById('start-btn').textContent = 'Start Server';
  document.getElementById('startup-progress').classList.add('hidden');
  // Reset steps
  ['container','ollama','model','ready'].forEach(s => {
    const el = document.getElementById('step-' + s);
    el.className = 'progress-step';
    el.querySelector('.step-icon').textContent = el.querySelector('.step-icon').textContent === '\u2713'
      ? ({'container':'1','ollama':'2','model':'3','ready':'4'}[s]) : el.querySelector('.step-icon').textContent;
  });
  document.getElementById('step-container .step-icon');
  const div = document.createElement('div');
  div.className = 'error';
  div.textContent = 'GPU container shut down.';
  chatEl.appendChild(div);
}

// Auto-resize textarea
msgEl.addEventListener('input', () => {
  msgEl.style.height = 'auto';
  msgEl.style.height = Math.min(msgEl.scrollHeight, 150) + 'px';
});
</script>
</body>
</html>
